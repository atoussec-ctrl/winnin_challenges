name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, lint, testes e build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      # Build primeiro: os testes da API resolvem @desafio/domain via dist.
      - name: Build de todos os pacotes
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Falha em qualquer vulnerabilidade high/critical nova. Advisories aceitas
      # conscientemente ficam em pnpm.auditConfig.ignoreGhsas (package.json).
      - name: Auditoria de dependencias (high/critical)
        run: pnpm audit --audit-level=high

      - name: Testes com cobertura minima de 95%
        run: pnpm coverage

  docker:
    name: Build das imagens Docker
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build da imagem da API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: desafio-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build da imagem do web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: desafio-web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
